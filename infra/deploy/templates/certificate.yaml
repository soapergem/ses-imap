apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.app.name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.app.name }}-tls
  issuerRef:
    name: {{ .Values.ingress.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
  - {{ .Values.app.domain }}
